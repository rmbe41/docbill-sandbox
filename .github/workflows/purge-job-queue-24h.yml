# Spec 07 §9.1: PII/Queue-Aufbewahrung; Edge `purge-job-queue-pii` (RPC `purge_job_queue_pii_24h`).
name: purge-job-queue-24h
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Purge job queue PII
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Set SUPABASE_URL and CRON_SECRET in repository secrets to enable." >&2
            exit 0
          fi
          curl -fsS -X POST "$SUPABASE_URL/functions/v1/purge-job-queue-pii" \
            -H "Authorization: Bearer $CRON_SECRET" -H "Content-Type: application/json" -d '{}'

# Spec: specs/01_DEV_LIFECYCLE.md §2.4 — Lint, Typecheck, Review-Agent, E2E.
# Python: Ruff/mypy — N/A (reines TypeScript-Repo).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      CYCLE_NUMBER: ${{ github.run_number }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (e2e-runner + review-agent)
        run: npm run typecheck:ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      # Gesamt-`tsc` meldet noch bestehende Projektfeler; lokal `npm run typecheck` nutzen.
      # Sobald das Projekt fehlerfrei typisiert ist, wieder aktivieren.
      # - name: Typecheck
      #   run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Review-Agent
        env:
          CYCLE_NUMBER: ${{ github.run_number }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npm run review-agent > review-report.json
        continue-on-error: false

      - name: E2E (Mock)
        env:
          CYCLE_NUMBER: ${{ github.run_number }}
          E2E_USE_MOCK: "1"
        run: npm run e2e

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cycle-01-reports
          path: |
            e2e-report.json
            review-report.json

name: GOÄ-Katalog Update

on:
  schedule:
    # Wöchentlich Sonntag 3:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch GOÄ catalog
        run: npm run goae:fetch

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/goae-catalog-full.json src/data/goae-catalog-meta.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/goae-catalog-full.json src/data/goae-catalog-meta.json
          git commit -m "chore: update GOÄ catalog"
          git push
